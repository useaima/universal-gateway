name: Contract Assertions

on:
  push:
    branches:
      - main
      - codex-*
      - codex/*
  pull_request:

jobs:
  contract-assertions:
    name: README, Docs, and Runtime Contract
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src/gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run contract assertions
        run: python scripts/assert_public_contract.py
