name: Web Dashboard CI

on:
  push:
    branches:
      - main
      - codex-*
      - codex/*
  pull_request:

jobs:
  frontend:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web_dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/web_dashboard/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend-smoke:
    name: Backend Compile and Smoke Tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src/gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio firebase-admin python-dotenv pygments fpdf2 cryptography mcp scikit-learn numpy web3 google-cloud-recaptcha-enterprise price-parser websockets

      - name: Compile gateway modules
        run: python -m compileall src/gateway

      - name: Run targeted smoke tests
        run: pytest tests/test_idempotency_locking.py tests/test_ephemeral_purge.py tests/test_final_look_slippage.py tests/test_gateway_public_contract.py tests/test_hitl_regressions.py tests/test_security_hardening.py

  functions-build:
    name: Firebase Functions Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm install

      - name: Build functions
        run: npm run build
