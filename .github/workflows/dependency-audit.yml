name: Dependency Audit

on:
  push:
    branches:
      - main
      - codex-*
      - codex/*
  pull_request:
  schedule:
    - cron: "23 2 * * 2"

permissions:
  contents: read

jobs:
  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit .

      - name: Run pip-audit
        run: pip-audit

  web-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web_dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/web_dashboard/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high

  functions-audit:
    name: Functions Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high
